<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumShield - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background-color: #16213e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            width: 350px;
        }
        h2 {
            color: #00d4ff;
            text-align: center;
            margin-bottom: 30px;
        }
        .error {
            color: #ff4444;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
            border-radius: 5px;
            background-color: #0f3460;
            color: white;
            font-size: 14px;
        }
        input::placeholder {
            color: #aaa;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #00b8d9;
        }
        .logo {
            text-align: center;
            color: #00d4ff;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🛡️ QuantumShield</div>
        <h2>Login</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <p class="error">{{ messages[0] }}</p>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" 
                   name="username" 
                   placeholder="Username" 
                   required>
            <input type="password" 
                   name="password" 
                   placeholder="Password" 
                   required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
